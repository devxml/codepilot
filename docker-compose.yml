version: "3.9"

services:

  # ─── PostgreSQL ────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ai_copilot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── FastAPI AI Service ────────────────────────────────────────
  ai-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      # Keep service credentials in the repository-level development env file.
      - ./.env
    volumes:
      - ./backend:/app
      - /tmp/ai_copilot_uploads:/tmp/uploads
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@db:5432/ai_copilot
      UPLOAD_DIR: /tmp/uploads

  # ─── Express API Server ────────────────────────────────────────
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - ./server/.env
    volumes:
      - ./server:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
      ai-service:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/ai_copilot
      AI_SERVICE_URL: http://ai-service:8000
      CORS_ORIGINS: http://localhost:3000

  # ─── Next.js Frontend ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    depends_on:
      - api

volumes:
  postgres_data:
